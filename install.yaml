name: ddev-agents-sync

ddev_version_constraint: '>= v1.24.10'

dependencies: []

pre_install_actions:
  - |
    #ddev-description:Checking prerequisites for Agents Sync
    echo "Installing ddev-agents-sync add-on..."

project_files:
  - docker-compose.agents-sync.yaml
  - agents-sync-build/Dockerfile.agents-sync
  - agents-sync-build/sync.sh
  - commands/host/agents-update

global_files: []

post_install_actions:
  - |
    #ddev-description:Configuring Agents Sync
    if [ ! -f .env.agents-sync ]; then
      cat > .env.agents-sync << 'ENVEOF'
    # Agents Sync configuration
    # Comma-separated list of git repositories to sync
    # Later repos override earlier ones (useful for private overrides)
    AGENTS_REPOS=https://github.com/trebormc/drupal-ai-agents.git

    # Set to "false" to disable automatic sync on ddev start
    AGENTS_AUTO_UPDATE=true

    # Timezone
    TZ=UTC
    ENVEOF
      echo "Created .env.agents-sync — edit to add custom repos"
    else
      echo ".env.agents-sync already exists, skipping"
    fi
    # Create .env.agents placeholders if missing — PROJECT level and HOST
    # (shared) level. Docker requires both files to exist before mounting,
    # otherwise it creates directories.
    # Model config is a variable-level cascade (each level only needs the
    # variables it wants to override):
    #   repo default < ~/.ddev/agents-sync/.env.agents < .ddev/.env.agents
    MODELS_TEMPLATE='# AI Model Configuration (optional overrides)
    # Default models come from the agent repository automatically.
    # Uncomment and edit any variable below to override — you only need
    # the variables you want to change (variable-level cascade):
    #   repo default < ~/.ddev/agents-sync/.env.agents (all projects) < .ddev/.env.agents (this project)
    # Changes take effect after: ddev agents-update && ddev restart
    #
    # --- OpenCode models (provider/model-id format) ---
    #OC_MODEL_GENIUS=opencode/glm-5.2   # hardest tasks (defaults to SMART)
    #OC_MODEL_SMART=opencode/glm-5.2
    #OC_MODEL_NORMAL=opencode/deepseek-v4-pro
    #OC_MODEL_CHEAP=opencode/deepseek-v4-flash
    #OC_MODEL_APPLIER=opencode/gpt-5-nano
    #OC_MODEL_VISION=opencode/minimax-m3   # MUST accept image input (defaults to NORMAL)
    #
    # --- Claude Code models (native aliases) ---
    #CC_MODEL_GENIUS=opus
    #CC_MODEL_SMART=opus
    #CC_MODEL_NORMAL=sonnet
    #CC_MODEL_CHEAP=haiku
    #CC_MODEL_APPLIER=haiku
    #CC_MODEL_VISION=sonnet'
    if [ ! -f .env.agents ]; then
      printf '%s\n' "$MODELS_TEMPLATE" > .env.agents
      echo "Created .env.agents — defaults from repo, edit to override (this project)"
    else
      echo ".env.agents already exists, skipping"
    fi
    HOST_AGENTS_DIR="${HOME}/.ddev/agents-sync"
    mkdir -p "$HOST_AGENTS_DIR"
    if [ ! -f "$HOST_AGENTS_DIR/.env.agents" ]; then
      printf '%s\n' "$MODELS_TEMPLATE" > "$HOST_AGENTS_DIR/.env.agents"
      echo "Created $HOST_AGENTS_DIR/.env.agents — edit to override models for ALL DDEV projects"
    fi
    echo "Agents Sync configured."
    echo ""
    echo "Agents Sync installed successfully!"
    echo ""
    echo "Default: syncs from trebormc/drupal-ai-agents"
    echo "Custom repos: edit .ddev/.env.agents-sync"
    echo "Custom models: edit .ddev/.env.agents (project) or ~/.ddev/agents-sync/.env.agents (all projects)"
    echo "Update:  ddev agents-update"

removal_actions:
  - |
    #ddev-description:Cleaning up Agents Sync
    echo "Agents Sync add-on removed."
