name: ddev-agents-sync

ddev_version_constraint: '>= v1.23.5'

dependencies: []

pre_install_actions:
  - |
    #ddev-description:Checking prerequisites for Agents Sync
    echo "Installing ddev-agents-sync add-on..."

project_files:
  - docker-compose.agents-sync.yaml
  - agents-sync-build/Dockerfile.agents-sync
  - agents-sync-build/sync.sh
  - commands/host/agents-update

global_files: []

post_install_actions:
  - |
    #ddev-description:Configuring Agents Sync
    if [ ! -f .env.agents-sync ]; then
      cat > .env.agents-sync << 'ENVEOF'
    #ddev-generated
    # Agents Sync configuration
    # Comma-separated list of git repositories to sync
    # Later repos override earlier ones (useful for private overrides)
    AGENTS_REPOS=https://github.com/trebormc/drupal-ai-agents.git

    # Set to "false" to disable automatic sync on ddev start
    AGENTS_AUTO_UPDATE=true

    # Timezone
    TZ=UTC
    ENVEOF
      echo "Created .env.agents-sync — edit to add custom repos"
    else
      echo ".env.agents-sync already exists, skipping"
    fi
    # Create empty .env.agents placeholder if missing.
    # Docker requires the file to exist before mounting, otherwise it creates a directory.
    # Default models come from the agent repo (.env.agents in drupal-ai-agents).
    # To override, uncomment and edit the variables in this file.
    if [ ! -f .env.agents ]; then
      cat > .env.agents << 'MODELSEOF'
    #ddev-generated
    # AI Model Configuration (optional overrides)
    # Default models come from the agent repository automatically.
    # Uncomment and edit any variable below to override.
    # Changes take effect after: ddev agents-update && ddev restart
    #
    # --- OpenCode models (provider/model-id format) ---
    #OC_MODEL_SMART=opencode/kimi-k2.5
    #OC_MODEL_NORMAL=opencode/minimax-m2.5
    #OC_MODEL_CHEAP=opencode/gpt-5-nano
    #OC_MODEL_APPLIER=opencode/gpt-5-nano
    #
    # --- Claude Code models (native aliases) ---
    #CC_MODEL_SMART=opus
    #CC_MODEL_NORMAL=sonnet
    #CC_MODEL_CHEAP=haiku
    #CC_MODEL_APPLIER=haiku
    MODELSEOF
      echo "Created .env.agents — defaults from repo, edit to override"
    else
      echo ".env.agents already exists, skipping"
    fi
    echo "Agents Sync configured."
    echo ""
    echo "Agents Sync installed successfully!"
    echo ""
    echo "Default: syncs from trebormc/drupal-ai-agents"
    echo "Custom repos: edit .ddev/.env.agents-sync"
    echo "Custom models: edit .ddev/.env.agents"
    echo "Update:  ddev agents-update"

removal_actions:
  - |
    #ddev-description:Cleaning up Agents Sync
    echo "Agents Sync add-on removed."
